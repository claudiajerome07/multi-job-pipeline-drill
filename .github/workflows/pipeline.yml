name: CI Pipeline

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci
      - run: npm run lint

  unit-tests:
    # Run unit tests only after lint succeeds
    needs: lint

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci
      - run: npm test

  build:
    # Build should start only after lint passes
    needs: lint

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci
      - run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: dist/

  integration-tests:
    # Integration tests require the build artifact
    needs: build

    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: dist/

      - run: npm run test:integration

  deploy-staging:
    # Deploy only after unit and integration tests pass
    needs:
      - unit-tests
      - integration-tests

    if: github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - run: echo "Deploying to staging environment"

  deploy-production:
    # Production deployment must wait for staging deployment
    needs: deploy-staging

    if: github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - run: echo "Deploying to production environment"

  notify:
    if: always()

    runs-on: ubuntu-latest

    steps:
      - run: echo "Pipeline notification sent"